# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US
reviews:
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  path_instructions:
    - path: "packages/ui/src/components/**"
      instructions: |
        Review for accessibility (proper ARIA attributes, keyboard navigation),
        consistent use of design tokens, and adherence to component API conventions
        used in this design system.
    - path: "packages/ui/src/styles/**"
      instructions: |
        Ensure no hardcoded colors or font values are introduced.
        All values should reference existing design tokens / CSS custom properties.
    - path: "apps/docs/**"
      instructions: |
        Review documentation for clarity and completeness.
        Ensure component examples are functional and representative.
chat:
  auto_reply: true
